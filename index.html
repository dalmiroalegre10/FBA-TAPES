<html lang="es">

<head>

</head>

<body>

<header>

<div class="container">

<h1>FBA TAPES</h1>

<p>La tienda oficial de cintas deportivas para rugby</p>

</div>

</header>

<section class="hero">
<div class="container">
  
<h2> Cuidarse es lo primero </h2>

<p>
Cintas de maxima calidad, para el maximo rendimiento. Sentirse seguro, buscando la excelencia. 
Porque rendir es importante, y cuidarse también. 
</p>


<div class="galeria-rugby">

<img src="pumas.jpeg" alt="Los Pumas">


<img src="grito.jpeg" alt="Jugador de Rugby">


<img src="festejo.jpeg" alt="Festejo Rugby">

</div>


</div>
</section>

<div class="container">

<input id="nombre" placeholder="Nombre y apellido">

<input id="instagram" placeholder="Instagram (opcional)">

<option value="">Seleccioná tu división</option>

<option>M15</option>

<option>M16</option>

<option>M17</option>

<option>M19</option>

</select>

</div>

</section>

<div class="container">

<h3>Catálogo</h3>

<div id="catalogo"></div>

</div>

</section>

<div class="container">

Enviar pedido

</button>
